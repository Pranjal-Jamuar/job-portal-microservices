# USER SERVICE DOCS
spring.cloud.gateway.server.webflux.routes[6].id=user-service-docs
spring.cloud.gateway.server.webflux.routes[6].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/user-service/v3/api-docs

# JOB SERVICE DOCS
spring.cloud.gateway.server.webflux.routes[7].id=job-service-docs
spring.cloud.gateway.server.webflux.routes[7].uri=lb://JOB-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/job-service/v3/api-docs

# APPLICATION SERVICE DOCS
spring.cloud.gateway.server.webflux.routes[8].id=application-service-docs
spring.cloud.gateway.server.webflux.routes[8].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/application-service/v3/api-docs

# RESUME SERVICE DOCS
spring.cloud.gateway.server.webflux.routes[9].id=resume-service-docs
spring.cloud.gateway.server.webflux.routes[9].uri=lb://RESUME-SERVICE
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/resume-service/v3/api-docs

# SEARCH SERVICE DOCS
spring.cloud.gateway.server.webflux.routes[10].id=search-service-docs
spring.cloud.gateway.server.webflux.routes[10].uri=lb://SEARCH-SERVICE
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/search-service/v3/api-docs

spring.cloud.gateway.server.webflux.routes[11].id=analytics-service-docs
spring.cloud.gateway.server.webflux.routes[11].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/analytics-service/v3/api-docs

springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=job-service
springdoc.swagger-ui.urls[1].url=/job-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=application-service
springdoc.swagger-ui.urls[2].url=/application-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=resume-service
springdoc.swagger-ui.urls[3].url=/resume-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=search-service
springdoc.swagger-ui.urls[4].url=/search-service/v3/api-docs

springdoc.swagger-ui.urls[5].name=analytics-service
springdoc.swagger-ui.urls[5].url=/analytics-service/v3/api-docs

spring.cloud.discovery.enabled=true

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Optional but cleaner
springdoc.swagger-ui.path=/swagger-ui.html

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

#management.tracing.sampling.probability=1.0
